name: PlaydatePlanner
options:
  bundleIdPrefix: com.shimondeitel.playdateplanner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PlaydatePlanner:
    type: application
    platform: iOS
    sources:
      - path: PlaydatePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.playdateplanner
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PlaydatePlanner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PlaydatePlannerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlaydatePlannerTests
      - path: PlaydatePlanner.storekit
    dependencies:
      - target: PlaydatePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.playdateplanner.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PlaydatePlannerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PlaydatePlannerUITests
    dependencies:
      - target: PlaydatePlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.playdateplanner.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PlaydatePlanner:
    build:
      targets:
        PlaydatePlanner: all
        PlaydatePlannerTests: [test]
        PlaydatePlannerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PlaydatePlanner.storekit
    test:
      config: Debug
      storeKitConfiguration: PlaydatePlanner.storekit
      targets:
        - PlaydatePlannerTests
        - PlaydatePlannerUITests
    archive:
      config: Release
